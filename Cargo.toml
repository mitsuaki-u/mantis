[package]
name = "honeybadger"
version = "0.1.0"
edition = "2021"

[lib]
name = "honeybadger"
path = "src/lib.rs"

[[bin]]
name = "honeybadger"
path = "src/main.rs"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
reqwest = { version = "0.11", features = ["json"] }
tokio = { version = "1.0", features = ["full", "signal"] }
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
env_logger = "0.10"
plotters = "0.3"
chrono = { version = "0.4", features = ["serde"] }
colored = "2.0"
http = "0.2"
notify = "6.1"
notify-rust = "4.9"
tokio-stream = "0.1"
uuid = { version = "1.0", features = ["v4"] }
futures = "0.3"
indicatif = "0.17"
unicode-truncate = "0.2"
once_cell = "1.18"
directories = "5.0"
tabled = "0.18"
rusqlite = { version = "0.29.0", features = ["bundled", "trace"] }
dirs = "5.0.1"
thiserror = "1.0"
async-trait = "0.1.88"
lazy_static = "1.4.0"
rand = "0.9.0"
tokio-tungstenite = "0.21.0"
futures-util = "0.3.30"

